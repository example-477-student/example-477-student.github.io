<!DOCTYPE html>
<html>

<head>

    <!-- meta tags and title -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App 2.0</title>

    <!-- external and internal CSS -->
    <link rel="stylesheet" href="styles.css" media="all">

    <!-- external and internal JavaScript -->
    <script src="scripts.js" defer></script>

</head>

<body>

    <main>
        <div id="currentInfo">
            <div id="currentTemp"><span></span>°F</div>
            <div id="currentStatus"></div>
        </div>

        <div id="currentHumidity"><span></span>%</div>

        <div id="currentWind"></div>

        <div id="futureInfo">
            <div class="futureDay">
                <div class="futureTemp"><span></span>°F</div>
                <div class="futureWind">4mph NW</div>
                <div class="futureStatus">Sunny</div>
            </div>
            <div class="futureDay">
                <div class="futureTemp"><span></span>°F</div>
                <div class="futureWind">6mph NW</div>
                <div class="futureStatus">Cloudy</div>
            </div>
            <div class="futureDay">
                <div class="futureTemp"><span></span>°F</div>
                <div class="futureWind">7mph NW</div>
                <div class="futureStatus">Rainy</div>
            </div>
        </div>
    </main>


</body>

</html>
